<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown 转微信公众号格式</title>
  <script>
    (function () {
      var path = window.location.pathname || '/';
      var base = path.endsWith('/index.html') ? path.slice(0, -'index.html'.length) : path;
      if (!base.endsWith('/')) base += '/';
      window.__APP_BASE__ = base;
      var css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = base + 'src/styles.css';
      document.head.appendChild(css);
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="wrap">
    <header class="hero">
      <div>
        <h1>Markdown → 微信公众号编辑器格式</h1>
        <p>粘贴/上传 Markdown，选择模板与字号，一键复制到公众号草稿箱。</p>
      </div>
      <button id="modeToggleBtn" class="ghost">切换浅色/深色</button>
    </header>

    <div class="grid">
      <section class="panel">
        <div class="title">Markdown 输入</div>
        <div class="toolbar">
          <input type="file" id="fileInput" accept=".md,.markdown,.txt,text/markdown,text/plain" />
          <button id="sampleBtn">示例内容</button>
          <button id="clearBtn">清空</button>
          <span id="status" class="status"></span>
        </div>
        <textarea id="markdown" placeholder="在这里粘贴 Markdown 文本..."></textarea>
      </section>

      <section class="panel">
        <div class="title">公众号预览（内联样式）</div>
        <div class="toolbar">
          <label for="themeSelect">模板</label>
          <select id="themeSelect">
            <option value="simple">简洁</option>
            <option value="tech">科技</option>
            <option value="edu">教育</option>
            <option value="news">新闻</option>
            <option value="magazine">杂志</option>
            <option value="minimal">极简留白</option>
            <option value="retro">复古专栏</option>
            <option value="night">暗夜霓虹</option>
          </select>

          <label for="fontScaleSelect">字号</label>
          <select id="fontScaleSelect">
            <option value="0">默认</option>
            <option value="1">小一号</option>
            <option value="2">小两号</option>
          </select>

          <button id="convertBtn">转换</button>
          <button id="copyBtn" class="primary">一键复制到公众号</button>
        </div>
        <div id="preview" class="preview"></div>
        <div class="help">提示：若公众号编辑器内容较长，建议分段粘贴，稳定性更好。</div>
      </section>
    </div>
  </div>

  <script>
    document.write('<script src="' + (window.__APP_BASE__ || './') + 'src/main.js"><\\/script>');
  </script>
</body>
</html>

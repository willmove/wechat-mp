<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown 转微信公众号格式</title>
    <link rel="stylesheet" href="./src/styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="wrap">
    <h1>Markdown → 微信公众号编辑器格式</h1>
    <div class="tip">支持粘贴/上传 Markdown，一键复制后直接粘贴到公众号草稿箱，样式更稳。</div>
    <div class="grid">
      <section class="panel">
        <div class="title">Markdown 输入</div>
        <div class="toolbar">
          <input type="file" id="fileInput" accept=".md,.markdown,.txt,text/markdown,text/plain" />
          <button id="sampleBtn">示例内容</button>
          <button id="clearBtn">清空</button>
          <span id="status" class="status"></span>
        </div>
        <textarea id="markdown" placeholder="在这里粘贴 Markdown 文本..."></textarea>
      </section>
      <section class="panel">
        <div class="title">公众号预览（内联样式）</div>
        <div class="toolbar">
          <label for="themeSelect">模板：</label>
          <select id="themeSelect">
            <option value="simple">简洁</option>
            <option value="tech">科技</option>
            <option value="edu">教育</option>
            <option value="news">新闻</option>
          </select>
          <button id="convertBtn">转换</button>
          <button id="copyBtn" class="primary">一键复制到公众号</button>
          <button id="cleanBtn">清理微信残留样式</button>
        </div>
        <div id="preview" class="preview"></div>
        <div class="help">复制后请直接粘贴到微信公众号编辑器（草稿箱）。若内容较长，建议分段粘贴。</div>
      </section>
    </div>
  </div>

    const fileInput = document.getElementById('fileInput');
